services:
  web:
    image: nginx:1.27-alpine
    volumes:
      - ./www:/var/www/html
      - ./nginx:/etc/nginx/conf.d
    ports:
      - "8080:80"
    depends_on:
     - php
  php:
    image: php:8.2-fpm
    container_name: lab2_php
    volumes:
      - ./www:/var/www/html
    expose:
      - "9000"

