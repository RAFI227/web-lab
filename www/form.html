<!DOCTYPE html>
<html lang="ru">
	<head>
	    <meta charset="UTF-8">
	    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	    <title>Бронирование билетов в кино</title>
	    <style>
		body {
		    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
		    background-color: #f0f2f5;
		    display: flex;
		    justify-content: center;
		    align-items: center;
		    height: 100vh;
		    margin: 0;
		}

		.form-container {
		    background: white;
		    padding: 30px;
		    border-radius: 12px;
		    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
		    width: 100%;
		    max-width: 400px;
		    animation: fadeIn 1s ease-in-out;
		}

		@keyframes fadeIn {
		    from { opacity: 0; transform: translateY(-20px); }
		    to { opacity: 1; transform: translateY(0); }
		}

		h2 { text-align: center; color: #333; }

		.form-group { margin-bottom: 15px; }

		label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }

		input[type="text"],
		input[type="number"],
		select {
		    width: 100%;
		    padding: 10px;
		    border: 1px solid #ddd;
		    border-radius: 6px;
		    box-sizing: border-box;
		}

		button {
		    width: 100%;
		    padding: 12px;
		    background-color: #007bff;
		    color: white;
		    border: none;
		    border-radius: 6px;
		    cursor: pointer;
		    font-size: 16px;
		    transition: background-color 0.3s ease;
		}

		button:hover {
		    background-color: #0056b3;
		}

		#result {
		    margin-top: 20px;
		    padding: 15px;
		    background: #e9f7ef;
		    border-radius: 6px;
		    display: none;
		}

		.idle-highlight {
		    border: 2px solid #ff4d4d !important;
		    background-color: #fff5f5;
		}
	    </style>
	</head>
	<body>

	<div class="form-container">
	    <h2>Билеты в кино</h2>
	    <form id="cinemaForm">
		<div class="form-group">
		    <label>Ваше имя:</label>
		    <input type="text" name="username" placeholder="Иван Иванов" required>
		</div>

		<div class="form-group">
		    <label>Количество билетов:</label>
		    <input type="number" name="ticket_count" min="1" max="10" value="1">
		</div>

		<div class="form-group">
		    <label>Выберите фильм:</label>
		    <select name="movie">
			<option value="Дюна: Часть вторая">Дюна: Часть вторая</option>
			<option value="Интерстеллар">Интерстеллар</option>
			<option value="Бэтмен">Бэтмен</option>
		    </select>
		</div>

		<div class="form-group">
		    <label>
			<input type="checkbox" name="is_3d"> Нужны 3D очки
		    </label>
		</div>

		<div class="form-group">
		    <label>Тип места:</label>
		    <input type="radio" name="seat_type" value="Стандарт" checked> Стандарт
		    <input type="radio" name="seat_type" value="VIP"> VIP
		</div>

		<button type="submit">Забронировать</button>
	    </form>

	    <div id="result"></div>
	</div>

	<script>
	    const form = document.getElementById('cinemaForm');
	    const resultDiv = document.getElementById('result');
	    const inputs = form.querySelectorAll('input, select');
	    
	    form.addEventListener('submit', function(e) {
		e.preventDefault(); // Отмена перезагрузки
		
		const formData = new FormData(this);
		let output = "<strong>Успешно!</strong><br>";
		
		output += `Зритель: ${formData.get('username')}<br>`;
		output += `Билетов: ${formData.get('ticket_count')}<br>`;
		output += `Фильм: ${formData.get('movie')}<br>`;
		output += `Режим: ${formData.has('is_3d') ? '3D' : '2D'}<br>`;
		output += `Место: ${formData.get('seat_type')}`;

		resultDiv.innerHTML = output;
		resultDiv.style.display = 'block';
	    });

	    let idleTimer;

	    function resetTimer() {
		inputs.forEach(el => el.classList.remove('idle-highlight'));
		
		clearTimeout(idleTimer);
		idleTimer = setTimeout(() => {
		    alert("Пожалуйста, заполните форму!");
		    inputs.forEach(el => {
			if(el.type !== 'radio' && el.type !== 'checkbox') {
			    el.classList.add('idle-highlight');
			}
		    });
		}, 15000);
	    }

	    form.addEventListener('mousemove', resetTimer);
	    form.addEventListener('keypress', resetTimer);

	    resetTimer();
	</script>

	</body>
</html>
